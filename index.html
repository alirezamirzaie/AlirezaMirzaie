<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>علیرضا میرزایی | فرانت‌اند دولوپر</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    :root{--bg:#050810;--accent:#5b6af7;--accent2:#a78bfa;--text:#e8ecff;--muted:#7a83a8;--card:#0d1426;--border:rgba(91,106,247,.18)}
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth;overflow-x:hidden;max-width:100%}
    body{background:var(--bg);color:var(--text);font-family:'Vazirmatn',sans-serif;overflow-x:hidden;max-width:100%;position:relative}
    #bg-canvas{position:fixed;inset:0;z-index:0;opacity:.55}
    .navbar-custom{position:fixed;top:0;left:0;right:0;z-index:1000;padding:1.1rem 2.5rem;display:flex;align-items:center;justify-content:space-between;background:rgba(5,8,16,.6);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}
    .navbar-logo{font-size:1.35rem;font-weight:900;color:#a78bfa;text-decoration:none}
    .navbar-logo span{color:#5b6af7}
    .nav-links{display:flex;gap:2rem;list-style:none}
    .nav-links a{color:var(--muted);text-decoration:none;font-size:.92rem;font-weight:500;transition:color .25s;position:relative}
    .nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transition:transform .3s}
    .nav-links a:hover{color:var(--text)}
    .nav-links a:hover::after{transform:scaleX(1)}
    .nav-toggle{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:.4rem;z-index:1001}
    .nav-toggle span{display:block;width:24px;height:2px;background:var(--text);border-radius:2px;transition:all .3s}
    .nav-toggle.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
    .nav-toggle.open span:nth-child(2){opacity:0}
    .nav-toggle.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
    .mobile-menu{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(5,8,16,.97);backdrop-filter:blur(18px);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2.2rem;opacity:0;visibility:hidden;transition:opacity .3s}
    .mobile-menu.open{opacity:1;visibility:visible}
    .mobile-menu a{color:var(--text);text-decoration:none;font-size:1.4rem;font-weight:700}
    @media(max-width:768px){
      .nav-links{display:none}
      .nav-toggle{display:flex}
      .navbar-custom{padding:1rem 1.25rem}
    }
    section{position:relative;z-index:10}
    #hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:7rem 1rem 4rem;overflow:hidden}
    .hero-glow{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);width:700px;height:700px;background:radial-gradient(circle,rgba(91,106,247,.12) 0%,transparent 70%);pointer-events:none;z-index:1}
    .hero-badge{display:inline-flex;align-items:center;gap:.5rem;background:rgba(91,106,247,.12);border:1px solid var(--border);border-radius:50px;padding:.35rem 1rem;font-size:.82rem;color:var(--accent2);margin-bottom:2rem;animation:fadeDown .8s ease both}
    .dot{width:7px;height:7px;background:#22c55e;border-radius:50%;box-shadow:0 0 8px #22c55e;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
    .hero-name{font-size:clamp(2.8rem,8vw,6.5rem);font-weight:900;line-height:1.05;letter-spacing:-2px;margin-bottom:1rem;animation:fadeUp .9s .1s ease both}
    .gradient{background:linear-gradient(135deg,#fff 0%,#a78bfa 50%,#5b6af7 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .hero-sub{font-size:clamp(1rem,2.5vw,1.35rem);color:var(--muted);margin-bottom:2.5rem;font-weight:400;animation:fadeUp .9s .2s ease both}
    .hero-sub strong{color:var(--accent2);font-weight:700}
    .hero-cta{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;animation:fadeUp .9s .3s ease both}
    .btn-primary-custom{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:.85rem 2.2rem;border-radius:50px;font-family:'Vazirmatn',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;transition:all .25s;box-shadow:0 8px 32px rgba(91,106,247,.4);text-decoration:none;display:inline-block}
    .btn-primary-custom:hover{transform:translateY(-3px);box-shadow:0 16px 48px rgba(91,106,247,.65);color:#fff}
    .btn-outline-custom{background:transparent;color:var(--text);border:1.5px solid var(--border);padding:.85rem 2.2rem;border-radius:50px;font-family:'Vazirmatn',sans-serif;font-weight:600;font-size:1rem;cursor:pointer;transition:all .25s;text-decoration:none;display:inline-block}
    .btn-outline-custom:hover{border-color:var(--accent);color:var(--accent2)}
    #about{padding:7rem 0}
    .about-card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:3rem;position:relative;overflow:hidden}
    .about-card::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(167,139,250,.15) 0%,transparent 70%)}
    .about-photo{width:150px;height:150px;border-radius:50%;object-fit:cover;object-position:top;margin:0 auto 1.5rem;display:block;box-shadow:0 0 40px rgba(91,106,247,.6);border:3px solid rgba(91,106,247,.4);animation:floatAvatar 4s ease-in-out infinite}
    @keyframes floatAvatar{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    .about-text h3{font-size:1.8rem;font-weight:900;margin-bottom:.4rem}
    .about-text .role{color:var(--accent2);font-weight:600;margin-bottom:1.1rem;font-size:.95rem}
    .about-text p{color:var(--muted);line-height:1.9}
    @media(max-width:576px){
      .about-card{padding:1.75rem}
      .contact-box{padding:2rem 1.5rem}
      #about,#skills{padding:4.5rem 0}
      #contact{padding:4.5rem 0 3.5rem}
    }
    #skills{padding:6rem 0;background:linear-gradient(180deg,transparent,rgba(91,106,247,.04),transparent)}
    .section-title{text-align:center;margin-bottom:3rem}
    .section-eyebrow{display:inline-block;font-size:.78rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:.6rem}
    .section-title h2{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:900;letter-spacing:-1px}
    .skill-pills{display:flex;flex-wrap:wrap;gap:.85rem;justify-content:center}
    .skill-pill{background:var(--card);border:1px solid var(--border);border-radius:50px;padding:.6rem 1.4rem;display:flex;align-items:center;gap:.5rem;font-size:.9rem;font-weight:600;transition:all .3s;cursor:default}
    .skill-pill:hover{border-color:var(--accent);color:var(--accent2);transform:translateY(-3px);box-shadow:0 8px 24px rgba(91,106,247,.2)}
    .skill-pill span{font-size:1.1rem}
    #contact{padding:6rem 0 5rem}
    .contact-box{background:var(--card);border:1px solid var(--border);border-radius:28px;padding:3.5rem;text-align:center;position:relative;overflow:hidden}
    .contact-box::before{content:'';position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:500px;height:300px;background:radial-gradient(ellipse,rgba(91,106,247,.2) 0%,transparent 70%);pointer-events:none}
    .contact-box h2{font-size:2.2rem;font-weight:900;margin-bottom:.6rem}
    .contact-box p{color:var(--muted);max-width:420px;margin:0 auto 2rem}
    .social-links{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-top:1.5rem}
    .social-link{display:flex;align-items:center;gap:.6rem;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:14px;padding:.7rem 1.3rem;text-decoration:none;color:var(--muted);font-size:.88rem;font-weight:600;transition:all .25s}
    .social-link:hover{background:rgba(91,106,247,.15);border-color:var(--accent);color:var(--accent2);transform:translateY(-3px);box-shadow:0 8px 24px rgba(91,106,247,.25)}
    .social-link .s-icon{font-size:1.2rem}
    footer{text-align:center;padding:2rem;border-top:1px solid var(--border);color:var(--muted);font-size:.83rem;position:relative;z-index:10}
    .cursor{position:fixed;width:12px;height:12px;background:var(--accent);border-radius:50%;pointer-events:none;z-index:9999;transition:transform .1s;mix-blend-mode:screen}
    .cursor-ring{position:fixed;width:40px;height:40px;border:1.5px solid rgba(91,106,247,.5);border-radius:50%;pointer-events:none;z-index:9998;transition:width .2s,height .2s}
    @media(hover:none),(pointer:coarse){.cursor,.cursor-ring{display:none}}
    .reveal{opacity:0;transform:translateY(40px);transition:all .8s cubic-bezier(.16,1,.3,1)}
    .reveal.visible{opacity:1;transform:none}
    @keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:none}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}
    .scroll-progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));z-index:1100;width:0}
  </style>
</head>
<body>
<div class="scroll-progress" id="scrollProgress"></div>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<canvas id="bg-canvas"></canvas>

<nav class="navbar-custom">
  <a class="navbar-logo" href="#hero"><span>علیرضا</span> میرزایی</a>
  <ul class="nav-links">
    <li><a href="#about">درباره من</a></li>
    <li><a href="#skills">مهارت‌ها</a></li>
    <li><a href="#contact">ارتباط</a></li>
  </ul>
  <button class="nav-toggle" id="navToggle" aria-label="منو"><span></span><span></span><span></span></button>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <a href="#about">درباره من</a>
  <a href="#skills">مهارت‌ها</a>
  <a href="#contact">ارتباط</a>
</div>

<section id="hero">
  <div class="hero-glow"></div>
  <div style="position:relative;z-index:2">
    <div class="hero-badge"><span class="dot"></span>فرانت‌اند دولوپر</div>
    <h1 class="hero-name"><div class="gradient">علیرضا میرزایی</div></h1>
    <p class="hero-sub">متخصص <strong id="typeTarget">HTML &amp; CSS</strong></p>
    <div class="hero-cta">
      <a href="#about" class="btn-primary-custom">بیشتر بدون</a>
      <a href="#contact" class="btn-outline-custom">ارتباط با من</a>
    </div>
  </div>
</section>
